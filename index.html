              <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idia - Student Research & Project Sharing Platform</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- React & ReactDOM CDN (NO BABEL NEEDED) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #ffffff;
      color: #0f172a;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body class="bg-white min-h-screen">

  <div id="root"></div>

  <script>
    // React destructuring
    const { useState, useEffect, useMemo, createElement: e } = React;

    // --- CATEGORY LIST ---
    const CATEGORIES = [
      { id: 'ALL', label: 'All', colorHex: '#0F172A' },
      { id: 'Design', label: 'Design', colorHex: '#40E0D0' },
      { id: 'Artificial Intelligence', label: 'AI', colorHex: '#FF007F' },
      { id: 'Research Article', label: 'Article', colorHex: '#0055FF' },
      { id: 'Sustainability', label: 'Sustainability', colorHex: '#00FA9A' }
    ];

    // --- SAMPLE INITIAL DATA ---
    const INITIAL_POSTS = [
      {
        postId: 'post-1',
        authorUsername: 'daria_dev',
        authorAvatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150',
        title: 'Open Source AI-Powered Research Assistant',
        contentText: 'We developed an open-source Python library that accelerates academic literature reviews for high school and university students.',
        category: 'Artificial Intelligence',
        coverPhotoUrl: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800',
        createdAt: Date.now() - 3600000 * 5,
        likesCount: 24,
        likedBy: ['user-1'],
        commentsCount: 3
      },
      {
        postId: 'post-2',
        authorUsername: 'mira_design',
        authorAvatar: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150',
        title: 'Smart Recycling Bin Design',
        contentText: 'A next-generation zero-waste container prototype that sorts waste instantly using computer vision systems.',
        category: 'Sustainability',
        coverPhotoUrl: 'https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?w=800',
        createdAt: Date.now() - 3600000 * 28,
        likesCount: 18,
        likedBy: [],
        commentsCount: 1
      }
    ];

    // --- HELPERS ---
    const getFormattedTime = (timestamp) => {
      const diffHours = Math.floor((Date.now() - timestamp) / 3600000);
      return diffHours < 24 ? `${diffHours}h ago` : `${Math.floor(diffHours / 24)}d ago`;
    };

    // --- COMPONENTS ---

    // Header Component
    const Header = () => {
      return e('header', { className: 'sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200 px-4 py-3' },
        e('div', { className: 'max-w-6xl mx-auto flex items-center justify-between gap-2' },
          e('div', { className: 'flex items-center gap-2 cursor-pointer' },
            e('div', { className: 'w-9 h-9 rounded-xl bg-gradient-to-tr from-amber-500 to-amber-300 flex items-center justify-center font-black text-slate-950 text-xl border border-amber-200' }, 'i'),
            e('h1', { className: 'text-xl font-black text-slate-900 tracking-tight' }, 'idia', e('span', { className: 'text-amber-500' }, '.'))
          ),
          e('a', { href: 'https://www.buymeacoffee.com/daria', target: '_blank', className: 'flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-amber-400 text-slate-950 font-black text-xs' }, 
            '☕ Support'
          )
        )
      );
    };

    // Post Card Component
    const PostCard = ({ post, onLike }) => {
      const isLiked = post.likedBy.includes('user-daria');
      const catColor = CATEGORIES.find(c => c.id === post.category)?.colorHex || '#000';

      return e('article', { className: 'bg-white rounded-2xl border border-slate-200 p-4 sm:p-5 mb-4 shadow-sm' },
        e('div', { className: 'flex items-center justify-between mb-3' },
          e('div', { className: 'flex items-center gap-2.5' },
            e('img', { src: post.authorAvatar, className: 'w-8 h-8 rounded-full border' }),
            e('div', null,
              e('div', { className: 'font-bold text-sm text-slate-900' }, `@${post.authorUsername}`),
              e('div', { className: 'text-[10px] text-slate-500 mt-0.5' }, getFormattedTime(post.createdAt))
            )
          ),
          e('span', { className: 'px-2 py-1 rounded text-[10px] font-bold text-white', style: { backgroundColor: catColor } }, post.category)
        ),
        e('div', { className: 'w-full h-40 rounded-xl overflow-hidden mb-3 bg-slate-100' },
          e('img', { src: post.coverPhotoUrl, className: 'w-full h-full object-cover' })
        ),
        e('h3', { className: 'font-black text-lg text-slate-900 mb-2' }, post.title),
        e('p', { className: 'text-sm text-slate-600 mb-4 line-clamp-3' }, post.contentText),
        e('div', { className: 'flex items-center gap-4 pt-3 border-t border-slate-100' },
          e('button', { onClick: () => onLike(post.postId), className: `flex items-center gap-1 font-semibold text-sm ${isLiked ? 'text-red-600' : 'text-slate-600'}` }, 
            isLiked ? '❤️' : '🤍', ` ${post.likesCount}`
          ),
          e('span', { className: 'flex items-center gap-1 font-semibold text-sm text-slate-600' }, '💬 ', post.commentsCount)
        )
      );
    };

    // App Component
    const App = () => {
      const [posts, setPosts] = useState(INITIAL_POSTS);

      const handleLike = (postId) => {
        setPosts(prev => prev.map(p => {
          if (p.postId === postId) {
            const isLiked = p.likedBy.includes('user-daria');
            if (!isLiked && window.confetti) window.confetti({ particleCount: 30, spread: 40 });
            return {
              ...p,
              likesCount: isLiked ? p.likesCount - 1 : p.likesCount + 1,
              likedBy: isLiked ? p.likedBy.filter(id => id !== 'user-daria') : [...p.likedBy, 'user-daria']
            };
          }
          return p;
        }));
      };

      return e('div', { className: 'min-h-screen bg-slate-50' },
        e(Header, null),
        e('main', { className: 'max-w-2xl mx-auto p-4' },
          posts.map(post => e(PostCard, { key: post.postId, post: post, onLike: handleLike }))
        )
      );
    };

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App, null));
  </script>
</body>
  </html>
