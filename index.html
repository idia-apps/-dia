<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faro - Gençlik İçerik ve Proje Platformu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0fdf4', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

  <!-- Header / Navigation -->
  <header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-green-500 to-emerald-300 flex items-center justify-center font-bold text-slate-950 text-xl shadow-lg shadow-green-500/20">
          F
        </div>
        <span class="text-2xl font-black tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Faro</span>
      </div>

      <div class="flex items-center space-x-3">
        <button id="btn-login" class="px-4 py-2 text-sm font-medium bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg transition-all border border-slate-700 flex items-center space-x-2">
          <span>Giriş Yap</span>
        </button>
        <button id="btn-new-post" class="px-4 py-2 text-sm font-semibold bg-green-500 hover:bg-green-600 text-slate-950 rounded-lg shadow-lg shadow-green-500/20 transition-all flex items-center space-x-1">
          <span>+ Paylaş</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section & Categories -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
    <div class="text-center space-y-4 max-w-2xl mx-auto pt-4">
      <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-green-400 via-emerald-300 to-teal-200 bg-clip-text text-transparent">
        Geleceğin Fikirleri Burada Parlıyor
      </h1>
      <p class="text-slate-400 text-base sm:text-lg">
        Genç yeteneklerin projelerini paylaştığı, makaleler yayınladığı ve birlikte ürettiği açık platform.
      </p>
    </div>

    <!-- Category Filters -->
    <div class="flex items-center justify-center gap-2 overflow-x-auto py-2 scrollbar-none" id="categories-container">
      <button class="cat-btn active px-4 py-2 rounded-full text-sm font-medium bg-green-500 text-slate-950 transition-all" data-cat="all">Tümü</button>
      <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all border border-slate-700" data-cat="Yazılım">💻 Yazılım</button>
      <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all border border-slate-700" data-cat="Tasarım">🎨 Tasarım</button>
      <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all border border-slate-700" data-cat="Bilim">🔬 Bilim</button>
      <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all border border-slate-700" data-cat="Girişimcilik">🚀 Girişimcilik</button>
      <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all border border-slate-700" data-cat="Sanat">🎭 Sanat</button>
    </div>

    <!-- Posts Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="posts-grid">
      <!-- Demo / Live posts will be injected here dynamically -->
    </div>
  </main>

  <!-- Firebase Scripts Entegrasyonu -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // GERÇEK FIREBASE ANAHTARLARIN
    const firebaseConfig = {
      apiKey: "AIzaSyDwJ9XNgiTe3S_ylK02IF0nj5NimHCN3f0",
      authDomain: "idia-521ce.firebaseapp.com",
      projectId: "idia-521ce",
      storageBucket: "idia-521ce.firebasestorage.app",
      messagingSenderId: "703904235668",
      appId: "1:703904235668:web:95127e53d86264ae6cb481"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    // Örnek Kartlar (Yükleme Öncesi Gösterim)
    const demoPosts = [
      { title: "Faro Platformu Canlıda!", category: "Yazılım", desc: "Genç araştırmacılar ve yazılımcılar için yeni nesil içerik paylaşım platformunu yayına aldık.", author: "Daria", readTime: "2 dk", likes: 12 },
      { title: "UI/UX Tasarımda Modern Yaklaşımlar", category: "Tasarım", desc: "Kullanıcı deneyimini artıran mikro etkileşimler ve renk paleti seçim kılavuzu.", author: "Deniz", readTime: "4 dk", likes: 8 },
      { title: "Yapay Zeka ve Geleceğin Meslekleri", category: "Bilim", desc: "Büyük dil modellerinin geliştirme süreçlerine etkisi ve yeni çalışma alanları.", author: "Arda", readTime: "5 dk", likes: 15 }
    ];

    function renderPosts(posts) {
      const grid = document.getElementById('posts-grid');
      grid.innerHTML = posts.map(p => `
        <div class="bg-slate-800/50 border border-slate-700/60 rounded-2xl p-6 flex flex-col justify-between hover:border-green-500/50 transition-all hover:-translate-y-1 shadow-lg">
          <div class="space-y-3">
            <div class="flex justify-between items-center">
              <span class="text-xs font-semibold px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded-full">${p.category}</span>
              <span class="text-xs text-slate-400">${p.readTime}</span>
            </div>
            <h3 class="text-xl font-bold text-slate-100">${p.title}</h3>
            <p class="text-sm text-slate-400 line-clamp-3">${p.desc}</p>
          </div>
          <div class="pt-6 border-t border-slate-700/50 flex justify-between items-center mt-4 text-xs text-slate-400">
            <span>Yazar: <strong class="text-slate-200">${p.author}</strong></span>
            <button onclick="triggerConfetti()" class="flex items-center space-x-1 hover:text-green-400 transition-colors">
              <span>❤️</span> <span>${p.likes}</span>
            </button>
          </div>
        </div>
      `).join('');
    }

    window.triggerConfetti = () => {
      confetti({ particleCount: 60, spread: 60, origin: { y: 0.8 } });
    };

    // Auth Listeners
    const loginBtn = document.getElementById('btn-login');
    loginBtn.addEventListener('click', async () => {
      if (currentUser) {
        await signOut(auth);
      } else {
        try {
          await signInWithPopup(auth, provider);
        } catch (err) {
          console.error("Giriş hatası:", err);
        }
      }
    });

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        loginBtn.innerHTML = `<span>${user.displayName || 'Profil'}</span>`;
      } else {
        loginBtn.innerHTML = `<span>Giriş Yap</span>`;
      }
    });

    // Initial Render
    renderPosts(demoPosts);
  </script>
</body>
  </html>
